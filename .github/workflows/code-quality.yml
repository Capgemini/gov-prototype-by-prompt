name: Code quality checks

permissions:
    contents: read
    security-events: write

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# For all npm install steps a workaround for npm/cli#9151: Node 22.22.2 ships npm 10.9.7 which
# crashes during self-upgrade to 11.x (lazy require of promise-retry).
# npm 10.9.8 fixes this with an eager require (npm/cli#9152).
# TODO: Remove the intermediate install once Node 22 bundles npm >=10.9.8
# (track nodejs/node#62463).

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Cache node modules
              id: cache-node-modules
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
                  lookup-only: true
            - name: Set up Node.js
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: package.json
            - name: Upgrade npm to v11
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm install -g "npm@10.9.8" && npm install -g "npm@>=11.6.4 <12"
            - name: Log node versions
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: node --version && npm --version
            - name: Install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm ci --ignore-scripts

    eslint:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Cache node modules
              id: cache-node-modules
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: package.json
            - name: Upgrade npm to v11
              run: npm install -g "npm@10.9.8" && npm install -g "npm@>=11.6.4 <12"
            - name: Install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm ci --ignore-scripts

            - name: Run ESLint
              run: npm run lint -- --max-warnings=0

    jest-unit-tests:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Cache node modules
              id: cache-node-modules
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: package.json
            - name: Upgrade npm to v11
              run: npm install -g "npm@10.9.8" && npm install -g "npm@>=11.6.4 <12"
            - name: Install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm ci --ignore-scripts

            - name: Run tests with coverage
              run: npm run test:unit -- --coverage --silent --maxWorkers=1

    playwright-e2e-tests:
        needs: setup
        timeout-minutes: 60
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Cache node modules
              id: cache-node-modules
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
            - name: Cache playwright browsers
              id: cache-playwright-browsers
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-browsers-${{ hashFiles('**/package-lock.json') }}
            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: package.json
            - name: Upgrade npm to v11
              run: npm install -g "npm@10.9.8" && npm install -g "npm@>=11.6.4 <12"
            - name: Install dependencies
              if: steps.cache-node-modules.outputs.cache-hit != 'true'
              run: npm ci --ignore-scripts

            - name: Install Playwright browsers
              run: npx playwright install --with-deps
            - name: Run Playwright tests
              run: npx playwright test
              env:
                  EMAIL_ADDRESS_ALLOWED_DOMAIN: testdomain.com
                  EMAIL_ADDRESS_ALLOWED_DOMAIN_REVEAL: true
                  LOG_USER_ID_IN_AZURE_APP_INSIGHTS: false
                  MONGODB_URI: mongodb://127.0.0.1:27017/unused?directConnection=true&authSource=admin
                  OPENAI_API_KEY: test-openai-api-key
                  OPENAI_BASE_URL: https://openai.azure.com/openai/v1/
                  OPENAI_MODEL_ID: gpt-4.1-mini
                  RATE_LIMITER_ENABLED: false
                  SESSION_SECRET: test-session-secret
                  SUGGESTIONS_ENABLED: true
            - name: Upload Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 30

    npm-audit:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                working-directory: ['', './data/zip-download/']
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: ${{ matrix.working-directory }}package.json
            - name: Upgrade npm to v11
              run: npm install -g "npm@10.9.8" && npm install -g "npm@>=11.6.4 <12"
            - name: Log node versions
              run: node --version && npm --version

            - name: Run npm audit with moderate threshold
              working-directory: ${{ matrix.working-directory }}
              run: npm audit --audit-level=moderate

    snyk-scan:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target-file:
                    [
                        './package-lock.json',
                        './data/zip-download/package-lock.json',
                    ]
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Run Snyk Monitor to check for vulnerabilities and upload results to Snyk
              if: github.ref == 'refs/heads/main'
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              continue-on-error: true # To make sure that future steps get called
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --file=${{ matrix.target-file }} --project-name=${{ matrix.target-file }}
                  command: monitor
            - name: Run Snyk Test to check for vulnerabilities and output results
              uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
              continue-on-error: true # To make sure that future steps get called
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: --file=${{ matrix.target-file }} --project-name=${{ matrix.target-file }} --sarif-file-output=snyk.sarif
                  command: test
            - name: Upload result to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
              with:
                  sarif_file: snyk.sarif
